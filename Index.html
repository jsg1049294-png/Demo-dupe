<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farbwähler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, sans-serif; }
        .tool-card {
            transition: all 0.3s;
        }
        .tool-card:active {
            transform: scale(0.92);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4">

<div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold text-center mb-8">🎨 Google Farbwähler</h1>

    <!-- Farbwähler -->
    <div class="bg-white rounded-3xl shadow-xl p-6 mb-10">
        <h2 class="text-2xl mb-4">Farbwähler</h2>
        <div id="colorBox" class="h-64 rounded-2xl mb-6 relative shadow-inner" style="background: hsl(300, 97%, 91%);">
            <div id="pickerDot" class="absolute top-6 right-6 w-10 h-10 rounded-full border-4 border-white shadow-xl" style="background:#e807e8"></div>
        </div>
        <input type="range" min="0" max="360" value="300" id="hue" class="w-full accent-pink-600" oninput="update()">
        
        <div class="grid grid-cols-3 gap-4 mt-6 text-center">
            <div><b>HEX</b><br><span id="hex">#e807e8</span></div>
            <div><b>RGB</b><br><span id="rgb">232, 7, 232</span></div>
            <div><b>HSV</b><br><span id="hsv">300°, 97%, 91%</span></div>
        </div>
    </div>

    <!-- Tools -->
    <h2 class="text-2xl mb-6">Werkzeuge & Unterhaltung</h2>
    <div class="grid grid-cols-2 sm:grid-cols-3 gap-4" id="toolsGrid"></div>
</div>

<!-- Modal -->
<div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl p-8 max-w-sm w-full mx-4" id="modalContent"></div>
</div>

<script>
    function update() {
        const hue = document.getElementById('hue').value;
        const color = `hsl(${hue}, 97%, 91%)`;
        document.getElementById('colorBox').style.background = color;
        document.getElementById('pickerDot').style.background = color;
        document.getElementById('hex').textContent = '#e807e8';
        document.getElementById('hsv').textContent = hue + '°, 97%, 91%';
    }

    function show(title, body) {
        document.getElementById('modalContent').innerHTML = `
            <h3 class="text-2xl font-bold mb-6 text-center">${title}</h3>
            ${body}
            <button onclick="closeModal()" class="mt-8 w-full py-4 bg-gray-100 rounded-2xl text-lg">Schließen</button>
        `;
        document.getElementById('modal').classList.remove('hidden');
    }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    const tools = [
        {n:"Münze", e:"🪙", f:() => show("Münzwurf", `<div class="text-8xl text-center my-8">🪙</div><p class="text-4xl text-center">${Math.random()<0.5?'Kopf 👑':'Zahl ⚡'}</p>`)},
        {n:"Tierlaute", e:"🐱", f:() => {
            const a = [{e:"🐱",s:"Miau!"},{e:"🐶",s:"Wuff!"}][Math.floor(Math.random()*2)];
            show("Tierlaute", `<div class="text-8xl text-center my-8">${a.e}</div><p class="text-4xl">${a.s}</p>`);
        }},
        {n:"Würfeln", e:"🎲", f:() => {
            let d = '';
            for(let i=0;i<6;i++) d += `<span class="text-6xl mx-2">${Math.floor(Math.random()*6)+1}</span>`;
            show("Würfeln", `<div class="flex justify-center my-6">${d}</div>`);
        }},
        {n:"Kreisel", e:"🪩", f:() => show("Kreisel", `<div class="text-8xl text-center my-12 animate-spin">🪩</div>`)},
        {n:"Emoji Kitchen", e:"😘", f:() => show("Emoji Kitchen", `<div class="text-6xl text-center my-12">🍎 + 🐱 = 🍎🐱</div>`)},
        {n:"Rechner", e:"🧮", f:() => show("Rechner", `<p class="text-center">Einfacher Rechner (kommt bald)</p>`)}
    ];

    function loadTools() {
        const grid = document.getElementById('toolsGrid');
        tools.forEach(t => {
            const card = document.createElement('div');
            card.className = "tool-card bg-white p-6 rounded-3xl shadow text-center cursor-pointer active:bg-gray-100";
            card.innerHTML = `<div class="text-5xl mb-3">${t.e}</div><p class="font-medium">${t.n}</p>`;
            card.onclick = t.f;
            grid.appendChild(card);
        });
    }

    window.onload = () => {
        loadTools();
        update();
    };
</script>
</body>
</html>
